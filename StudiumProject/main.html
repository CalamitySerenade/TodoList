<!DOCTYPE html>

<html>
    <head>
        <title>
            Main Page
        </title>
        <link rel="stylesheet" href="wilson.css">
    </head>
    <body>
        <nav>
            <img src="Assets/Logo.png" alt="Logo">
            <button onclick="changeImage()" id="theme-toggle" class="darkmode-btn">
                <img src="Assets/moon.png" alt="NightMode" class="nightLogo" id="myImage">
            </button>
        </nav>
        <h2>Your Studyboards</h2>
        <div id="studyboards">
            <ul id="testing">
                
            </ul>
        </div>
        <div id="options">
            <div class="create-join">
                <h2>Create a studyboard!</h2>
                <form>
                    <input type="text" id="name" placeholder="Studyboard name">
                    <button type="submit" id="createBtn">Click</button>
                </form>
            </div>
            <div class="create-join">
                <h2>Join a Studyboard!</h2>
                <form>
                    <input type="text" id="ID" placeholder="Studyboard ID">
                    <button type="submit" id="joinBtn">Click</button>
                </form>
            </div>
        </div>
        <script type="module" src="main.js"></script>
    </body>
</html>
